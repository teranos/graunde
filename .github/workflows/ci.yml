name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix build .#graunde
      - run: nix develop .#default --command dub test

  release:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/count-one'
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: macos-13
            target: x86_64-darwin
          - os: macos-latest
            target: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix build .#graunde
      - run: cp result/bin/graunde graunde-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: graunde-${{ matrix.target }}
          path: graunde-${{ matrix.target }}
